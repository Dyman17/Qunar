<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QUNAR Admin DB Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e1117;
      --panel: rgba(17, 24, 39, 0.9);
      --panel-strong: rgba(15, 23, 42, 0.95);
      --line: rgba(148, 163, 184, 0.25);
      --text: #e2e8f0;
      --muted: rgba(226, 232, 240, 0.65);
      --accent: #38bdf8;
      --accent-2: #a78bfa;
      --danger: #f87171;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(56, 189, 248, 0.12), transparent 40%),
        radial-gradient(circle at 90% 20%, rgba(167, 139, 250, 0.12), transparent 45%),
        linear-gradient(140deg, #0b111a, #121a2b 60%, #0b111a 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 20px 50px;
    }

    .shell {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      gap: 22px;
    }

    header {
      background: var(--panel);
      border-radius: 20px;
      border: 1px solid var(--line);
      padding: 22px 26px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    header h1 {
      font-size: 26px;
    }

    header p {
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 20px;
    }

    .card {
      background: var(--panel);
      border-radius: 20px;
      border: 1px solid var(--line);
      padding: 20px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 14px;
    }

    label {
      font-size: 12px;
      color: var(--muted);
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: var(--panel-strong);
      color: var(--text);
      font-size: 13px;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
    }

    button {
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(120deg, #38bdf8, #a78bfa);
      color: #0b111a;
      font-weight: 600;
      cursor: pointer;
    }

    button.secondary {
      background: rgba(148, 163, 184, 0.2);
      color: var(--text);
      border: 1px solid rgba(148, 163, 184, 0.3);
    }

    button.danger {
      background: rgba(248, 113, 113, 0.2);
      color: var(--danger);
      border: 1px solid rgba(248, 113, 113, 0.4);
    }

    .row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .status {
      font-size: 12px;
      color: var(--muted);
    }

    .tokens {
      display: grid;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .token-box {
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(15, 23, 42, 0.7);
      border-radius: 10px;
      padding: 8px 10px;
      word-break: break-all;
      font-size: 11px;
    }

    .table-wrap {
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 14px;
      overflow: auto;
      max-height: 420px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    th,
    td {
      padding: 8px 10px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.1);
      text-align: left;
    }

    th {
      position: sticky;
      top: 0;
      background: rgba(15, 23, 42, 0.95);
      color: var(--muted);
      font-weight: 600;
      z-index: 1;
    }

    tr:hover {
      background: rgba(56, 189, 248, 0.08);
    }

    .pill {
      display: inline-flex;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      background: rgba(148, 163, 184, 0.15);
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>QUNAR Admin DB Panel</h1>
      <p>Admin-only console for live PostgreSQL data. Login with an admin account, load tables, and manage rows safely through the protected API.</p>
      <div class="row">
        <div>
          <label>API Base</label>
          <input id="baseUrl" value="http://127.0.0.1:8000" />
        </div>
        <div>
          <label>Status</label>
          <div class="status" id="status">Idle</div>
        </div>
      </div>
    </header>

    <section class="grid">
      <div class="card">
        <h2>Admin Login</h2>
        <form id="loginForm">
          <input name="email" type="email" placeholder="admin email" required />
          <input name="password" type="password" placeholder="password" required />
          <button type="submit">Login</button>
        </form>
        <div class="row">
          <button class="secondary" type="button" id="refreshAccess">Refresh Access</button>
          <button class="secondary" type="button" id="logout">Logout</button>
          <button class="danger" type="button" id="clearTokens">Clear Tokens</button>
        </div>
        <div class="tokens">
          <div class="pill" id="tokenStatus">No tokens</div>
          <div>
            <div class="pill">Access Token</div>
            <div id="accessToken" class="token-box">-</div>
          </div>
          <div>
            <div class="pill">Refresh Token</div>
            <div id="refreshToken" class="token-box">-</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Tables</h2>
        <div class="row">
          <div>
            <label>Table</label>
            <select id="tableSelect"></select>
          </div>
          <div>
            <label>Limit</label>
            <input id="limitInput" type="number" value="50" min="1" max="500" />
          </div>
          <div>
            <label>Auto Refresh (5s)</label>
            <select id="autoRefresh">
              <option value="off" selected>Off</option>
              <option value="on">On</option>
            </select>
          </div>
        </div>
        <div class="row">
          <button type="button" id="loadTables">Load Tables</button>
          <button class="secondary" type="button" id="loadRows">Load Rows</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <div class="status" id="tableMeta">No table loaded</div>
      </div>
    </section>

    <section class="card">
      <h2>Row Editor</h2>
      <div class="row">
        <div>
          <label>Selected Table</label>
          <div class="pill" id="selectedTable">-</div>
        </div>
        <div>
          <label>Primary Key Column</label>
          <div class="pill" id="primaryKey">-</div>
        </div>
        <div>
          <label>Selected Row ID</label>
          <input id="rowId" placeholder="id" />
        </div>
      </div>
      <label>Row JSON</label>
      <textarea id="rowJson" placeholder='{"column":"value"}'></textarea>
      <div class="row">
        <button type="button" id="createRow">Create Row</button>
        <button class="secondary" type="button" id="updateRow">Update Row</button>
        <button class="danger" type="button" id="deleteRow">Delete Row</button>
      </div>
      <div class="status" id="editorStatus">Editor ready</div>
    </section>
  </div>

  <script>
    const API_PREFIX = "/api/v1";
    const ADMIN_PREFIX = "/api/admin/dyman";

    const baseEl = document.getElementById("baseUrl");
    const statusEl = document.getElementById("status");
    const tokenStatusEl = document.getElementById("tokenStatus");
    const accessTokenEl = document.getElementById("accessToken");
    const refreshTokenEl = document.getElementById("refreshToken");
    const tableSelect = document.getElementById("tableSelect");
    const limitInput = document.getElementById("limitInput");
    const autoRefreshEl = document.getElementById("autoRefresh");
    const tableHead = document.getElementById("tableHead");
    const tableBody = document.getElementById("tableBody");
    const tableMeta = document.getElementById("tableMeta");
    const selectedTableEl = document.getElementById("selectedTable");
    const primaryKeyEl = document.getElementById("primaryKey");
    const rowIdEl = document.getElementById("rowId");
    const rowJsonEl = document.getElementById("rowJson");
    const editorStatus = document.getElementById("editorStatus");

    let autoRefreshTimer = null;
    let currentTable = null;
    let currentPk = null;
    let currentColumns = [];

    const normalizeBase = () => baseEl.value.trim().replace(/\/+$/, "");

    const setStatus = (text, isError = false) => {
      statusEl.textContent = text;
      statusEl.style.color = isError ? "#f87171" : "rgba(226, 232, 240, 0.65)";
    };

    const setEditorStatus = (text, isError = false) => {
      editorStatus.textContent = text;
      editorStatus.style.color = isError ? "#f87171" : "rgba(226, 232, 240, 0.65)";
    };

    const renderTokens = () => {
      const access = localStorage.getItem("qunar_access") || "-";
      const refresh = localStorage.getItem("qunar_refresh") || "-";
      accessTokenEl.textContent = access;
      refreshTokenEl.textContent = refresh;
      tokenStatusEl.textContent = access !== "-" ? "Tokens loaded" : "No tokens";
    };

    const saveTokens = (data) => {
      if (data.access_token) localStorage.setItem("qunar_access", data.access_token);
      if (data.refresh_token) localStorage.setItem("qunar_refresh", data.refresh_token);
      renderTokens();
    };

    const getAccessToken = () => {
      const token = localStorage.getItem("qunar_access");
      return token && token !== "-" ? token : null;
    };

    const getRefreshToken = () => {
      const token = localStorage.getItem("qunar_refresh");
      return token && token !== "-" ? token : null;
    };

    const refreshAccessToken = async () => {
      const refresh = getRefreshToken();
      if (!refresh) throw new Error("No refresh token");
      const base = normalizeBase();
      const res = await fetch(`${base}${API_PREFIX}/auth/refresh`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ refresh_token: refresh }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || `Refresh failed (${res.status})`);
      saveTokens(data);
      return data.access_token;
    };

    const apiFetch = async (path, options = {}) => {
      const { method = "GET", body = null, auth = false, retry = true } = options;
      const base = normalizeBase();
      const headers = {};
      if (body) headers["Content-Type"] = "application/json";
      if (auth) {
        const access = getAccessToken();
        if (!access) throw new Error("Access token required");
        headers.Authorization = `Bearer ${access}`;
      }
      const res = await fetch(`${base}${path}`, {
        method,
        headers,
        body: body ? JSON.stringify(body) : undefined,
      });
      const raw = await res.text();
      let data = raw;
      try {
        data = raw ? JSON.parse(raw) : {};
      } catch {
        data = raw;
      }
      if (res.status === 401 && auth && retry) {
        await refreshAccessToken();
        return apiFetch(path, { method, body, auth, retry: false });
      }
      if (!res.ok) throw new Error(data.detail || `Request failed (${res.status})`);
      return data;
    };

    const loadTables = async () => {
      setStatus("Loading tables...");
      try {
        const data = await apiFetch(`${ADMIN_PREFIX}/tables`, { auth: true });
        const tables = data.tables || [];
        tableSelect.innerHTML = "";
        tables.forEach((table) => {
          const option = document.createElement("option");
          option.value = table;
          option.textContent = table;
          tableSelect.appendChild(option);
        });
        if (tables.length > 0) {
          tableSelect.value = tables[0];
        }
        setStatus(`Loaded ${tables.length} tables`);
      } catch (err) {
        setStatus(err.message, true);
      }
    };

    const renderTable = (payload) => {
      currentTable = payload.table;
      currentPk = payload.primary_key;
      currentColumns = payload.columns || [];
      selectedTableEl.textContent = currentTable || "-";
      primaryKeyEl.textContent = currentPk || "-";

      tableHead.innerHTML = "";
      tableBody.innerHTML = "";
      const headRow = document.createElement("tr");
      currentColumns.forEach((col) => {
        const th = document.createElement("th");
        th.textContent = col.name;
        headRow.appendChild(th);
      });
      const actionTh = document.createElement("th");
      actionTh.textContent = "Action";
      headRow.appendChild(actionTh);
      tableHead.appendChild(headRow);

      (payload.rows || []).forEach((row) => {
        const tr = document.createElement("tr");
        currentColumns.forEach((col) => {
          const td = document.createElement("td");
          const value = row[col.name];
          td.textContent = value === null || value === undefined ? "" : String(value);
          tr.appendChild(td);
        });
        const actionTd = document.createElement("td");
        const editBtn = document.createElement("button");
        editBtn.className = "secondary";
        editBtn.textContent = "Edit";
        editBtn.addEventListener("click", () => {
          rowJsonEl.value = JSON.stringify(row, null, 2);
          if (currentPk && row[currentPk] !== undefined) {
            rowIdEl.value = row[currentPk];
          }
          setEditorStatus("Row loaded into editor");
        });
        actionTd.appendChild(editBtn);
        tr.appendChild(actionTd);
        tableBody.appendChild(tr);
      });

      tableMeta.textContent = `Rows: ${payload.rows?.length || 0} | Total: ${payload.total} | Limit: ${payload.limit}`;
    };

    const loadRows = async () => {
      const table = tableSelect.value;
      if (!table) return;
      setStatus(`Loading ${table}...`);
      try {
        const limit = Number(limitInput.value || 50);
        const payload = await apiFetch(`${ADMIN_PREFIX}/table/${table}?limit=${limit}`, { auth: true });
        renderTable(payload);
        setStatus(`Loaded ${table}`);
      } catch (err) {
        setStatus(err.message, true);
      }
    };

    const createRow = async () => {
      if (!currentTable) return;
      try {
        const payload = JSON.parse(rowJsonEl.value || "{}");
        const data = await apiFetch(`${ADMIN_PREFIX}/table/${currentTable}`, {
          method: "POST",
          body: payload,
          auth: true,
        });
        setEditorStatus(data.message || "Row created");
        await loadRows();
      } catch (err) {
        setEditorStatus(err.message, true);
      }
    };

    const updateRow = async () => {
      if (!currentTable || !rowIdEl.value) {
        setEditorStatus("Row id required", true);
        return;
      }
      try {
        const payload = JSON.parse(rowJsonEl.value || "{}");
        const data = await apiFetch(`${ADMIN_PREFIX}/table/${currentTable}/${rowIdEl.value}`, {
          method: "PATCH",
          body: payload,
          auth: true,
        });
        setEditorStatus(data.message || "Row updated");
        await loadRows();
      } catch (err) {
        setEditorStatus(err.message, true);
      }
    };

    const deleteRow = async () => {
      if (!currentTable || !rowIdEl.value) {
        setEditorStatus("Row id required", true);
        return;
      }
      try {
        const data = await apiFetch(`${ADMIN_PREFIX}/table/${currentTable}/${rowIdEl.value}`, {
          method: "DELETE",
          auth: true,
        });
        setEditorStatus(data.message || "Row deleted");
        await loadRows();
      } catch (err) {
        setEditorStatus(err.message, true);
      }
    };

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const payload = Object.fromEntries(new FormData(e.target).entries());
      setStatus("Logging in...");
      try {
        const data = await apiFetch(`${API_PREFIX}/auth/login`, {
          method: "POST",
          body: payload,
          auth: false,
        });
        saveTokens(data);
        setStatus("Login success");
      } catch (err) {
        setStatus(err.message, true);
      }
    });

    document.getElementById("refreshAccess").addEventListener("click", async () => {
      try {
        setStatus("Refreshing access...");
        await refreshAccessToken();
        setStatus("Access token refreshed");
      } catch (err) {
        setStatus(err.message, true);
      }
    });

    document.getElementById("logout").addEventListener("click", async () => {
      try {
        const refresh = getRefreshToken();
        if (!refresh) throw new Error("No refresh token");
        await apiFetch(`${API_PREFIX}/auth/logout`, {
          method: "POST",
          body: { refresh_token: refresh },
          auth: true,
        });
        localStorage.removeItem("qunar_access");
        localStorage.removeItem("qunar_refresh");
        renderTokens();
        setStatus("Logged out");
      } catch (err) {
        setStatus(err.message, true);
      }
    });

    document.getElementById("clearTokens").addEventListener("click", () => {
      localStorage.removeItem("qunar_access");
      localStorage.removeItem("qunar_refresh");
      renderTokens();
      setStatus("Tokens cleared");
    });

    document.getElementById("loadTables").addEventListener("click", loadTables);
    document.getElementById("loadRows").addEventListener("click", loadRows);
    document.getElementById("createRow").addEventListener("click", createRow);
    document.getElementById("updateRow").addEventListener("click", updateRow);
    document.getElementById("deleteRow").addEventListener("click", deleteRow);

    tableSelect.addEventListener("change", loadRows);
    autoRefreshEl.addEventListener("change", () => {
      if (autoRefreshTimer) {
        clearInterval(autoRefreshTimer);
        autoRefreshTimer = null;
      }
      if (autoRefreshEl.value === "on") {
        autoRefreshTimer = setInterval(loadRows, 5000);
      }
    });

    renderTokens();
  </script>
</body>
</html>
